<div class="page-container">

  <div class="page-header">

    <h1 class="page-title">Panel de Productos</h1>

  </div>

  <!-- FORMULARIO -->
  <div class="card mb-4 p-3">

    <form [formGroup]="form" (ngSubmit)="agregar()">

      <div class="row">

        <div class="col-md-4">
          <input class="form-control" placeholder="Tipo" formControlName="tipo">
        </div>

        <div class="col-md-4">
          <input class="form-control" placeholder="Cantidad" type="number" formControlName="cantidad">
        </div>

        <div class="col-md-4">
          <input class="form-control" placeholder="Precio" type="number" formControlName="precio">
        </div>

      </div>

      <button class="btn btn-primary mt-3">
        Agregar producto
      </button>

    </form>

  </div>

  <!-- LISTA -->
  <div class="row">

    <div class="col-md-4 mb-4" *ngFor="let p of productos">

      <div class="card card-producto">

        <div class="card-body">

          <h5>{{ p.tipo }}</h5>

          <p>Cantidad: {{ p.cantidad }}</p>

          <p class="price">$ {{ p.precio }}</p>

          <button class="btn btn-warning btn-sm me-2">
            Editar
          </button>

          <button class="btn btn-danger btn-sm" (click)="eliminar(p.id)">
            Eliminar
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
